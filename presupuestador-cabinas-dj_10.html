<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuestador · Cabinas a medida · mere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Archivo:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ===================================================================== */
/*  COLORES DE MARCA (extraidos del logo mere)                           */
/*    Azul marino fondo : #071230                                        */
/*    Verde lima acento : #C4FF00                                        */
/*                                                                       */
/*  PRECIOS: editalos en el bloque <script> de abajo (busca "CONFIG").   */
/* ===================================================================== */

:root{
  --bg:#071230;
  --bg2:#0a1838;
  --card:#0c1c40;
  --card2:#102146;
  --line:#1d3061;
  --txt:#eaf0ff;
  --muted:#8794b8;
  --lime:#C4FF00;
  --lime-d:#a8e000;
  --glow:rgba(196,255,0,.30);
}

*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}

body{
  font-family:'Archivo',sans-serif;
  background:
    radial-gradient(820px 460px at 12% -8%, rgba(196,255,0,.07), transparent 60%),
    radial-gradient(760px 520px at 112% 8%, rgba(196,255,0,.05), transparent 60%),
    var(--bg);
  color:var(--txt);
  min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:32px 16px;line-height:1.5;
}

.app{width:100%;max-width:680px;position:relative}

/* ---------- Encabezado ---------- */
.head{margin-bottom:26px}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.brand img{height:40px;width:auto;display:block}
.kicker{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--lime);display:inline-flex;align-items:center;gap:8px;margin-bottom:12px;
}
.kicker::before{content:"";width:26px;height:1px;background:var(--lime);box-shadow:0 0 8px var(--glow)}
h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(28px,6vw,44px);line-height:1.02;letter-spacing:-.02em}
h1 em{font-style:normal;color:var(--lime);text-shadow:0 0 24px var(--glow)}
.sub{color:var(--muted);margin-top:10px;font-size:15px;max-width:46ch}

/* ---------- Progreso ---------- */
.progress{display:flex;gap:6px;margin:24px 0 22px}
.progress .seg{flex:1;height:4px;border-radius:99px;background:var(--line);overflow:hidden;position:relative}
.progress .seg.on::after{content:"";position:absolute;inset:0;border-radius:99px;background:var(--lime);box-shadow:0 0 10px var(--glow)}

/* ---------- Tarjeta ---------- */
.card{
  background:linear-gradient(180deg,var(--card),var(--bg2));
  border:1px solid var(--line);border-radius:18px;padding:26px;
  box-shadow:0 20px 60px -30px rgba(0,0,0,.9);
}
.step-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:.1em;margin-bottom:6px}
.q{font-family:'Syne',sans-serif;font-weight:700;font-size:21px;letter-spacing:-.01em;margin-bottom:4px}
.q-hint{color:var(--muted);font-size:13px;margin-bottom:18px}

/* ---------- Opciones ---------- */
.opts{display:grid;gap:14px}
.opt{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  background:var(--card2);border:1px solid var(--line);border-radius:12px;
  padding:15px 17px;cursor:pointer;text-align:left;width:100%;color:inherit;font:inherit;
  transition:border-color .18s,transform .12s,box-shadow .18s,background .18s;
}
.opt:hover{border-color:#2a448a;transform:translateY(-1px)}
.opt.sel{
  border-color:var(--lime);
  background:linear-gradient(180deg,rgba(196,255,0,.08),rgba(196,255,0,.02));
  box-shadow:0 0 0 1px var(--lime),0 0 24px -8px var(--glow);
}
.opt .label{font-weight:600;font-size:15px;display:block}
.opt .desc{color:var(--muted);font-size:12.5px;margin-top:7px;line-height:1.45;display:block}
.opt .tick{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:grid;place-items:center;transition:.18s}
.opt.sel .tick{border-color:var(--lime);background:var(--lime)}
.opt.sel .tick::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--bg)}

/* texto informativo (hover en desktop, tap del ícono "i" en celular) */
.opt{position:relative}
.opt.has-info{flex-direction:column;align-items:stretch;gap:0}
.opt .opt-row{display:flex;align-items:center;gap:14px;width:100%}
.opt .opt-text{flex:1}
.info-btn{
  flex-shrink:0;width:24px;height:24px;border-radius:50%;
  border:1.5px solid var(--line);color:var(--muted);
  display:grid;place-items:center;font-family:Georgia,'Times New Roman',serif;
  font-style:italic;font-weight:700;font-size:14px;line-height:1;
  cursor:pointer;transition:border-color .15s,color .15s;
}
.info-btn:hover{border-color:var(--lime);color:var(--lime)}
.opt.info-open .info-btn{border-color:var(--lime);background:var(--lime);color:var(--bg)}
.info-pop{
  max-height:0;opacity:0;overflow:hidden;margin-top:0;padding:0 14px;
  background:var(--card2);border-radius:10px;
  font-size:13px;line-height:1.5;color:var(--txt);text-align:left;
  transition:max-height .24s ease,opacity .18s,margin-top .24s,padding .24s;
}
.opt.info-open .info-pop{max-height:240px;opacity:1;margin-top:12px;padding:12px 14px}

/* checkbox de los extras (multi-seleccion) */
.opt-toggle .check{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;display:grid;place-items:center;transition:.16s}
.opt-toggle.sel .check{border-color:var(--lime);background:var(--lime)}
.opt-toggle.sel .check::after{content:"";width:11px;height:6px;border-left:2.5px solid var(--bg);border-bottom:2.5px solid var(--bg);transform:translateY(-1px) rotate(-45deg)}

/* opciones con imagen (banner arriba) */
.opt.has-img{flex-direction:column;align-items:stretch;padding:0;gap:0;overflow:hidden}
.opt.has-img .opt-img{width:100%;height:118px;object-fit:cover;display:block;border-bottom:1px solid var(--line)}
.opt.has-img.sel .opt-img{border-bottom-color:var(--lime)}
.opt.has-img .opt-body{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 17px}

/* ---------- Campo de ancho ---------- */
.width-input{position:relative;display:flex;align-items:center}
.width-input input{
  width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;
  padding:18px 64px 18px 20px;color:var(--txt);font-family:'Syne',sans-serif;font-weight:700;
  font-size:30px;letter-spacing:-.01em;transition:border-color .18s,box-shadow .18s;
  -moz-appearance:textfield;
}
.width-input input::-webkit-outer-spin-button,
.width-input input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.width-input input:focus{outline:none;border-color:var(--lime);box-shadow:0 0 0 3px rgba(196,255,0,.14)}
.width-input input::placeholder{color:#566188;font-weight:600}
.width-input .unit{
  position:absolute;right:20px;font-family:'JetBrains Mono',monospace;font-weight:700;
  font-size:17px;color:var(--lime);pointer-events:none;
}
.width-msg{color:#ff7088;font-size:12.5px;margin-top:8px;display:none}
.width-msg.show{display:block}

.batea-info{margin-top:4px;background:var(--card2);border:1px solid var(--line);border-left:3px solid var(--lime);border-radius:10px;padding:13px 15px;font-size:14px;color:var(--txt)}
.batea-info strong{color:var(--lime)}

/* ---------- Paso multi (chips) ---------- */
.subgroup{margin-bottom:18px}
.subgroup:last-of-type{margin-bottom:2px}
.sub-label{font-size:13.5px;color:var(--txt);font-weight:600;margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  background:var(--card2);border:1px solid var(--line);border-radius:10px;
  padding:11px 16px;color:var(--txt);font:inherit;font-size:14px;font-weight:600;
  cursor:pointer;transition:border-color .16s,background .16s,box-shadow .16s,transform .1s;
}
.chip:hover{border-color:#2a448a;transform:translateY(-1px)}
.chip.sel{
  border-color:var(--lime);
  background:linear-gradient(180deg,rgba(196,255,0,.12),rgba(196,255,0,.03));
  box-shadow:0 0 0 1px var(--lime),0 0 18px -8px var(--glow);color:#f1ffc7;
}
.chip.locked{opacity:.4;cursor:not-allowed;color:var(--muted)}
.chip.locked:hover{border-color:var(--line);transform:none}
.lock-hint{color:var(--muted);font-size:12.5px;font-style:italic}

/* ---------- Navegacion ---------- */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:12px}
.btn{font-family:'Archivo',sans-serif;font-weight:600;font-size:15px;border:none;border-radius:11px;padding:13px 24px;cursor:pointer;transition:transform .12s,box-shadow .18s,opacity .18s;letter-spacing:.01em}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--lime);color:var(--bg);box-shadow:0 8px 26px -10px var(--glow);font-weight:700}
.btn-primary:hover{background:#d2ff33;box-shadow:0 10px 32px -8px var(--glow)}
.btn-primary:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.btn-ghost:hover{color:var(--txt);border-color:#2a448a}

/* ---------- Resultado ---------- */
.result .est-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);text-align:center}
.est-range{font-family:'Syne',sans-serif;font-weight:800;text-align:center;font-size:clamp(30px,8vw,46px);letter-spacing:-.02em;margin:8px 0 2px;color:var(--lime);text-shadow:0 0 40px var(--glow)}
.est-note{text-align:center;color:var(--muted);font-size:12.5px;margin-bottom:22px}
.breakdown{display:grid;gap:8px;margin:18px 0}
.brow{display:flex;justify-content:space-between;font-size:14px;padding:11px 14px;background:var(--card2);border-radius:10px;border:1px solid var(--line)}
.brow .k{color:var(--muted)}
.brow .v{font-family:'JetBrains Mono',monospace;font-weight:500}
.result-nav{margin-bottom:8px}
.char-title{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin:4px 0 10px}
.brow.char{align-items:flex-start;gap:14px}
.brow.char .k{color:var(--muted);flex-shrink:0}
.brow.char .v.txt{font-family:'Archivo',sans-serif;font-weight:600;color:var(--txt);text-align:right;max-width:64%}

/* ---------- Formulario lead ---------- */
.lead{margin-top:8px;display:grid;gap:12px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500}
.field input{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:13px 15px;color:var(--txt);font:inherit;font-size:15px;transition:border-color .18s,box-shadow .18s}
.field input:focus{outline:none;border-color:var(--lime);box-shadow:0 0 0 3px rgba(196,255,0,.14)}
.field input::placeholder{color:#566188}
.field.err input{border-color:#ff5470;box-shadow:0 0 0 3px rgba(255,84,112,.14)}
.field .msg{color:#ff7088;font-size:12px;margin-top:5px;display:none}
.field.err .msg{display:block}

.wa-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--lime);color:var(--bg);font-weight:700;font-size:16px;border:none;border-radius:12px;padding:16px;cursor:pointer;margin-top:4px;box-shadow:0 10px 28px -10px var(--glow);transition:transform .12s,background .18s}
.wa-btn:hover{background:#d2ff33}
.wa-btn:active{transform:scale(.99)}
.wa-btn svg{width:20px;height:20px}

.disclaimer{margin-top:20px;text-align:center;color:#566188;font-size:11.5px;line-height:1.5}

/* ---------- Final ---------- */
.done{text-align:center;padding:14px 0}
.done .ico{width:64px;height:64px;border-radius:50%;margin:0 auto 16px;display:grid;place-items:center;background:linear-gradient(180deg,rgba(196,255,0,.16),transparent);border:1.5px solid var(--lime);box-shadow:0 0 30px -6px var(--glow)}
.done .ico svg{width:30px;height:30px;stroke:var(--lime)}
.done h2{font-family:'Syne',sans-serif;font-weight:700;font-size:24px;margin-bottom:8px}
.done p{color:var(--muted);font-size:15px;max-width:38ch;margin:0 auto}

.fade{animation:fade .35s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

@media(max-width:480px){body{padding:18px 12px}.card{padding:20px 17px}}
</style>
</head>

const money = n => new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(Math.round(n));

const STEPS = [
  { key:"ancho",   type:"input",   q:"¿Qué ancho necesitás?",        hint:"Escribí el ancho disponible para la cabina, en centímetros." },
  { key:"material",type:"options",  q:"¿Qué material preferís?",       hint:"Trabajamos con placas base MDF de 18 mm." },
  { key:"equiposDj",type:"multi",   q:"¿Qué va a soportar el mueble?",    hint:"Configurá el mixer y los equipos que entran en el mueble." },
  { key:"batea",   type:"batea",   q:"¿Incluye batea para los vinilos?", hint:"La batea son los espacios del mueble para almacenar los discos.",
    when: () => ['vinilo','ambas'].includes(state.equiposDj.tipo) },
  { key:"montaje", type:"options",  q:"¿Cómo van apoyados los equipos sobre el mueble?", hint:"Define el material necesario y la complejidad del trabajo." },
  { key:"extras",  type:"extras",  q:"Detalles finales", hint:"Tocá los extras que quieras sumar. Podés dejar ninguno." },
];

const state = { ancho:null, material:null, equiposDj:{ mixer:null, tipo:null, cantidad:null }, batea:{ incluye:null }, montaje:null, extras:{}, step:0 };
const screen = document.getElementById('screen');
const progressEl = document.getElementById('progress');

/* pasos visibles segun condiciones (when) */
function activeSteps(){ return STEPS.filter(s => !s.when || s.when()); }

function renderProgress(){
  const total = activeSteps().length + 1;
  progressEl.innerHTML = "";
  for(let i=0;i<total;i++){
    const s = document.createElement('div');
    s.className = "seg" + (i<=state.step ? " on":"");
    progressEl.appendChild(s);
  }
}

function calc(){
  const Wcm = Number(state.ancho)||0;
  const matKey = state.material || 'melamina';
  const M = CONFIG.material[matKey];
  const cajon = state.montaje === 'empotrados';
  const e = state.equiposDj;
  const bateaAplica = ['vinilo','ambas'].includes(e.tipo) && state.batea.incluye==='si';
  const cubos = bateaAplica ? cubosPorAncho() : 0;
  const calados = cajon ? equiposCount() : 0;

  // despiece -> placas + tapacanto
  const pieces = cutList(Wcm, cajon, bateaAplica);
  const placas = packCount(pieces);
  const tapacantoM = tapacantoMetros(pieces) + calados * CONFIG.tapacantoPorCaladoM;

  const costoPlacas = placas * M.precioPlaca;
  const costoTap    = tapacantoM * M.precioTapacanto;
  const materiales  = costoPlacas + costoTap;

  const caladosCosto = calados * CONFIG.caladoPorEquipo;

  // extras (se suman aparte, ya como precio final)
  const ext = Object.entries(CONFIG.extras).reduce((s,[k,o]) => {
    if(!state.extras[k]) return s;
    if(o.dinamico==='ruedas') return s + ruedasCount() * o.precioPorRueda;
    return s + (o.add||0);
  }, 0);

  const totalRaw = materiales * CONFIG.factorVenta + caladosCosto + ext + CONFIG.cortePlaca + CONFIG.flete + CONFIG.precioBase;
  const total = Math.max(2049283, totalRaw); // piso: rango mínimo nunca baja de $1.803.369
  return { placas, tapacantoM, materiales, caladosCosto, calados, cubos, ext, total,
           min: total*(1-CONFIG.margenRango), max: total*(1+CONFIG.margenRango) };
}

/* ---- Despiece del mueble (medidas en mm). alto=950, prof=600, ancho variable. ---- */
function cutList(Wcm, cajon, batea){
  const W = Wcm*10, P = CONFIG.dims.prof*10, H = CONFIG.dims.alto*10;
  const raw = [];
  const add = (w,h,n,rot) => { for(let i=0;i<n;i++) raw.push({w,h,rot:!!rot}); };
  add(P, H, 2);        // 2 patas (laterales) 600 x 950
  add(P, W, 1);        // tapa 600 x ancho
  add(P, W, 1);        // estante 600 x ancho
  add(H, W, 1);        // fondo 950 x ancho
  if(cajon){
    add(P, W, 1);      // +1 tapa
    add(100, P, 4, true); // 4 laterales del cajón 100 x 600
  }
  if(batea){
    const cubosFila = Math.floor(Wcm / CONFIG.batea.anchoPorCubo);
    add(350, 350, (cubosFila+1)*2); // divisores de los cubos
  }
  // partir piezas más largas que la placa
  const BW = CONFIG.placa.ancho, BH = CONFIG.placa.alto, out = [];
  for(const p of raw){
    if(p.h > BH){ const n=Math.ceil(p.h/BH), seg=Math.ceil(p.h/n); for(let i=0;i<n;i++) out.push({w:p.w,h:seg,rot:p.rot}); }
    else if(p.w > BW){ const n=Math.ceil(p.w/BW), seg=Math.ceil(p.w/n); for(let i=0;i<n;i++) out.push({w:seg,h:p.h,rot:p.rot}); }
    else out.push(p);
  }
  return out;
}

/* tapacanto = perímetro completo de cada pieza, en metros lineales */
function tapacantoMetros(pieces){
  let mm = 0; for(const p of pieces) mm += 2*(p.w+p.h); return mm/1000;
}

/* cuántas placas 1830x2600 hacen falta (nesting, sin rotar las piezas con veta) */
function packCount(pieces){
  const BW = CONFIG.placa.ancho, BH = CONFIG.placa.alto;
  const list = [...pieces].sort((a,b)=> (b.w*b.h)-(a.w*a.h));
  const bins = [];
  for(const p of list){
    let placed = false;
    for(const bin of bins){ if(placeIn(bin,p,BW,BH)){ placed=true; break; } }
    if(!placed){ const b={free:[{x:0,y:0,w:BW,h:BH}]}; bins.push(b); placeIn(b,p,BW,BH); }
  }
  return bins.length;
}
function placeIn(bin,p){
  let best=null, bestScore=Infinity, bestRot=false;
  for(const fr of bin.free){
    const opts=[[p.w,p.h,false]]; if(p.rot) opts.push([p.h,p.w,true]);
    for(const [w,h,r] of opts){
      if(w<=fr.w && h<=fr.h){ const ss=Math.min(fr.w-w, fr.h-h); if(ss<bestScore){bestScore=ss;best=fr;bestRot=r;} }
    }
  }
  if(!best) return false;
  const w = bestRot? p.h:p.w, h = bestRot? p.w:p.h;
  const u = {x:best.x,y:best.y,w,h}, nf=[];
  for(const fr of bin.free){
    if(!(u.x<fr.x+fr.w && u.x+u.w>fr.x && u.y<fr.y+fr.h && u.y+u.h>fr.y)){ nf.push(fr); continue; }
    if(u.x>fr.x) nf.push({x:fr.x,y:fr.y,w:u.x-fr.x,h:fr.h});
    if(u.x+u.w<fr.x+fr.w) nf.push({x:u.x+u.w,y:fr.y,w:fr.x+fr.w-(u.x+u.w),h:fr.h});
    if(u.y>fr.y) nf.push({x:fr.x,y:fr.y,w:fr.w,h:u.y-fr.y});
    if(u.y+u.h<fr.y+fr.h) nf.push({x:fr.x,y:u.y+u.h,w:fr.w,h:fr.y+fr.h-(u.y+u.h)});
  }
  bin.free = nf.filter((a,i)=> !nf.some((b,j)=> i!==j && a.x>=b.x&&a.y>=b.y&&a.x+a.w<=b.x+b.w&&a.y+a.h<=b.y+b.h));
  return true;
}

/* cantidad de ruedas estimada segun el ancho (1 par cada 'parCada' cm) */
function ruedasCount(){
  const r = CONFIG.extras.ruedas;
  return Math.max(2, Math.ceil((Number(state.ancho)||0) / r.parCada)) * 2;
}

/* cubos estimados segun el ancho del mueble */
function cubosPorAncho(){
  const C = CONFIG.batea;
  const porFila = Math.floor((Number(state.ancho)||0) / C.anchoPorCubo);
  return Math.max(0, porFila) * C.filas;
}

/* cantidad de equipos elegida en el paso de equipos (n2..n6 -> 2..6) */
function equiposCount(){
  const c = state.equiposDj.cantidad;
  return c ? Number(c.replace('n','')) : 0;
}

/* tope de equipos segun los canales del mixer elegido (c2->2, c4->4, c6->6).
   Sin mixer elegido todavia, no limitamos (devolvemos el maximo posible). */
function maxEquiposPorMixer(){
  const m = state.equiposDj.mixer;
  return m ? Number(m.replace('c','')) : Infinity;
}

function renderStep(){
  renderProgress();
  const steps = activeSteps();
  const st = steps[state.step];
  const last = state.step===steps.length-1;
  let html = `<div class="card fade">
    <div class="step-num">PASO ${state.step+1} / ${steps.length}</div>
    <div class="q">${st.q}</div>
    <div class="q-hint">${st.hint}</div>`;

  if(st.type==="input"){
    const a = CONFIG.ancho;
    html += `<div class="width-input">
        <input type="number" id="ancho" inputmode="numeric"
               min="${a.min}" max="${a.max}" step="${a.paso||1}" placeholder="${a.placeholder}"
               value="${state.ancho!==null?state.ancho:''}">
        <span class="unit">${a.unidad}</span>
      </div>
      <div class="width-msg" id="ancho-msg">Ingresá un ancho entre ${a.min} y ${a.max} cm.</div>`;
  } else if(st.type==="multi"){
    const groups = CONFIG[st.key];
    const stt = state[st.key];
    const topeEquipos = maxEquiposPorMixer();
    const mixerElegido = isFinite(topeEquipos); // hay mixer seleccionado
    // aviso si el ancho ingresado es menor al mínimo requerido por los equipos
    const minReq = anchoMinimo();
    if(state.ancho && Number(state.ancho) < minReq){
      html += `<div class="width-msg show" style="margin-bottom:12px">⚠ El ancho ingresado (${state.ancho} cm) es menor al mínimo requerido (${minReq} cm). Volvé al primer paso para corregirlo.</div>`;
    }
    for(const [gk,g] of Object.entries(groups)){
      // El grupo "cantidad" queda bloqueado hasta elegir el mixer.
      // Una vez elegido, el sub-titulo aclara el tope vigente.
      let subLabel = g.label;
      if(gk==='cantidad'){
        subLabel = mixerElegido
          ? `${g.label} <span style="color:var(--muted);font-weight:500">(hasta ${topeEquipos}, según el mixer)</span>`
          : `${g.label} <span class="lock-hint">— elegí primero el mixer</span>`;
      }
      html += `<div class="subgroup"><div class="sub-label">${subLabel}</div><div class="chips">`;
      for(const [ok,o] of Object.entries(g.opts)){
        // La cantidad de equipos no puede superar los canales del mixer elegido.
        if(gk==='cantidad' && Number(ok.replace('n','')) > topeEquipos) continue;
        // Sin mixer elegido, las opciones de cantidad se muestran bloqueadas.
        const locked = (gk==='cantidad' && !mixerElegido) ? " locked":"";
        const sel = stt[gk]===ok ? " sel":"";
        html += `<button class="chip${sel}${locked}" data-group="${gk}" data-key="${ok}"${locked?' aria-disabled="true"':''}>${o.label}</button>`;
      }
      html += `</div></div>`;
    }
  } else if(st.type==="batea"){
    const b = state.batea;
    html += `<div class="subgroup"><div class="chips">
        <button class="chip${b.incluye==='si'?' sel':''}" data-bgroup="incluye" data-key="si">Sí</button>
        <button class="chip${b.incluye==='no'?' sel':''}" data-bgroup="incluye" data-key="no">No</button>
      </div></div>`;
    if(b.incluye==='si'){
      html += `<div class="batea-info fade">Según el ancho (${state.ancho} cm), estimamos <strong>${cubosPorAncho()} espacios</strong> del mueble para guardar discos.</div>`;
    }
  } else if(st.type==="extras"){
    const opts = CONFIG[st.key];
    html += `<div class="opts">`;
    for(const [k,o] of Object.entries(opts)){
      const on = state.extras[k] ? " sel":"";
      const desc = (o.dinamico==='ruedas' && state.extras[k]) ? `${o.desc} · ${ruedasCount()} ruedas según el ancho` : o.desc;
      html += `<button class="opt opt-toggle${on}" data-key="${k}">
        <span class="opt-text"><span class="label">${o.label}</span><span class="desc">${desc}</span></span>
        <span class="check"></span>
      </button>`;
    }
    html += `</div>`;
  } else {
    const opts = CONFIG[st.key];
    html += `<div class="opts">`;
    for(const [k,o] of Object.entries(opts)){
      const sel = state[st.key]===k ? " sel":"";
      if(o.img){
        html += `<button class="opt has-img${sel}" data-key="${k}">
          <img class="opt-img" src="${o.img}" alt="${o.label}">
          <span class="opt-body">
            <span><span class="label">${o.label}</span><span class="desc">${o.desc}</span></span>
            <span class="tick"></span>
          </span>
        </button>`;
      } else {
        const hasInfo = !!o.info;
        html += `<button class="opt${hasInfo?' has-info':''}${sel}" data-key="${k}">
          <span class="opt-row">
            <span class="opt-text"><span class="label">${o.label}</span><span class="desc">${o.desc}</span></span>
            ${hasInfo?`<span class="info-btn" data-info role="button" aria-label="Más información">i</span>`:''}
            <span class="tick"></span>
          </span>
          ${hasInfo?`<span class="info-pop">${o.info}</span>`:''}
        </button>`;
      }
    }
    html += `</div>`;
  }

  html += `<div class="nav">
      <button class="btn btn-ghost" id="back" ${state.step===0?'style="visibility:hidden"':''}>&larr; Volver</button>
      <button class="btn btn-primary" id="next" ${stepValid()?'':'disabled'}>
        ${last?'Ver presupuesto':'Siguiente &rarr;'}
      </button>
    </div>
  </div>`;
  screen.innerHTML = html;

  if(st.type==="input"){
    const inp = document.getElementById('ancho');
    const sync = ()=>{
      const v = inp.value.trim();
      state.ancho = v==='' ? null : Number(v);
      const valid = stepValid();
      document.getElementById('next').disabled = !valid;
      const n = Number(v);
      if(v!=='' && !valid){
        const minReq = anchoMinimo();
        document.getElementById('ancho-msg').textContent =
          n < minReq ? `El ancho mínimo con ${state.equiposDj.cantidad ? state.equiposDj.cantidad.replace('n','') : ''} equipos es ${minReq} cm.`
          : `Ingresá un ancho entre ${CONFIG.ancho.min} y ${CONFIG.ancho.max} cm.`;
        document.getElementById('ancho-msg').classList.add('show');
      } else {
        document.getElementById('ancho-msg').classList.remove('show');
      }
    };
    inp.oninput = sync;
    inp.onkeydown = e=>{ if(e.key==='Enter' && stepValid()) document.getElementById('next').click(); };
    inp.focus();
  } else if(st.type==="multi"){
    screen.querySelectorAll('.chip').forEach(el=>{ el.onclick = ()=>{
      // Las opciones bloqueadas (cantidad sin mixer elegido) no responden.
      if(el.classList.contains('locked')) return;
      const group = el.dataset.group, key = el.dataset.key;
      state[st.key][group] = key;
      // Si cambia el mixer y la cantidad ya elegida supera su tope, la reseteamos.
      if(group==='mixer'){
        const tope = Number(key.replace('c',''));
        const c = state.equiposDj.cantidad;
        if(c && Number(c.replace('n','')) > tope) state.equiposDj.cantidad = null;
      }
      renderStep();
    }; });
  } else if(st.type==="batea"){
    screen.querySelectorAll('.chip').forEach(el=>{ el.onclick = ()=>{
      state.batea[el.dataset.bgroup] = el.dataset.key;
      renderStep();
    }; });
  } else if(st.type==="extras"){
    screen.querySelectorAll('.opt').forEach(el=>{ el.onclick = ()=>{ const k=el.dataset.key; state.extras[k]=!state.extras[k]; renderStep(); }; });
  } else {
    screen.querySelectorAll('.opt').forEach(el=>{ el.onclick = ()=>{ state[st.key]=el.dataset.key; renderStep(); }; });
    screen.querySelectorAll('.info-btn').forEach(el=>{ el.onclick = (ev)=>{ ev.stopPropagation(); el.closest('.opt').classList.toggle('info-open'); }; });
  }

  const back = document.getElementById('back');
  if(back) back.onclick = ()=>{
    if(state.ancho && Number(state.ancho) < anchoMinimo()){
      state.step = 0;
    } else {
      state.step--;
    }
    renderStep();
  };
  document.getElementById('next').onclick = ()=>{
    if(!stepValid()) return;
    if(state.step < steps.length-1){ state.step++; renderStep(); }
    else { state.step = steps.length; renderResult(); }
  };
}

/* ancho mínimo según cantidad de equipos elegida */
function anchoMinimo(){
  const c = state.equiposDj.cantidad;
  if(c === 'n6') return 220;
  if(c === 'n5') return 220;
  if(c === 'n4') return 180;
  return CONFIG.ancho.min; // 120
}

/* valida el paso actual */
function stepValid(){
  const st = activeSteps()[state.step];
  if(st.type==="input"){
    const n = Number(state.ancho);
    return state.ancho!==null && !isNaN(n) && n>=anchoMinimo() && n<=CONFIG.ancho.max;
  }
  if(st.type==="multi"){
    const stt = state[st.key];
    const allFilled = Object.keys(CONFIG[st.key]).every(gk => stt[gk]!=null);
    if(!allFilled) return false;
    // validar ancho mínimo según equipos elegidos
    const minReq = anchoMinimo();
    if(state.ancho && Number(state.ancho) < minReq) return false;
    return true;
  }
  if(st.type==="batea"){
    return state.batea.incluye!=null;
  }
  if(st.type==="extras"){
    return true; // opcional: se puede avanzar sin elegir ninguno
  }
  return !!state[st.key];
}

/* resumen de extras incluidos */
function extrasResumen(){
  return Object.entries(CONFIG.extras).filter(([k]) => state.extras[k])
    .map(([k,o]) => o.dinamico==='ruedas' ? `${o.label} (${ruedasCount()})` : o.label).join(', ');
}

/* resumen de los equipos elegidos (para desglose y WhatsApp) */
function equiposResumen(){
  const e = state.equiposDj, G = CONFIG.equiposDj;
  return `Mixer ${G.mixer.opts[e.mixer].label} · ${G.tipo.opts[e.tipo].label} · ${G.cantidad.opts[e.cantidad].label} equipos`;
}

function renderResult(){
  renderProgress();
  const r = calc();
  const matNote = state.material === 'melamina'
    ? `<p style="color:var(--muted);font-size:13px;margin-top:14px;line-height:1.5">La melamina puede ser lisa o símil madera — hay que definir el color o textura al confirmar el presupuesto. El presupuesto no incluye el envío.</p>`
    : `<p style="color:var(--muted);font-size:13px;margin-top:14px;line-height:1.5">El precio toma como referencia enchapado guatambú entintado. Si querés otra madera, el costo puede variar. El presupuesto no incluye el envío.</p>`;
  screen.innerHTML = `<div class="card result fade">
    <div class="est-label">Tu presupuesto estimado</div>
    <div class="est-range">${money(r.min)} &ndash; ${money(r.max)}</div>
    <div class="est-note">Estimado orientativo en pesos · Te confirmamos el valor final por WhatsApp</div>
    <div class="char-title">Lo que elegiste</div>
    <div class="breakdown">
      <div class="brow char"><span class="k">Ancho</span><span class="v txt">${state.ancho} cm</span></div>
      <div class="brow char"><span class="k">Material</span><span class="v txt">${CONFIG.material[state.material].label}</span></div>
      <div class="brow char"><span class="k">Equipos</span><span class="v txt">${equiposResumen()}</span></div>
      ${['vinilo','ambas'].includes(state.equiposDj.tipo)?`<div class="brow char"><span class="k">Batea de vinilos</span><span class="v txt">${r.cubos>0?`Sí · ${r.cubos} espacios para discos`:'No incluida'}</span></div>`:''}
      <div class="brow char"><span class="k">Montaje</span><span class="v txt">${CONFIG.montaje[state.montaje].label}</span></div>
      ${Object.values(state.extras).some(Boolean)?`<div class="brow char"><span class="k">Extras</span><span class="v txt">${extrasResumen()}</span></div>`:''}
    </div>
    ${matNote}
    <div class="lead">
      <div class="q" style="font-size:18px;margin-top:6px">Dejanos tus datos y te enviamos la cotización</div>
      <div class="field" id="f-nombre"><label>Nombre</label><input type="text" id="nombre" placeholder="Tu nombre" autocomplete="name"><div class="msg">Ingresá tu nombre.</div></div>
      <div class="field" id="f-wsp"><label>WhatsApp</label><input type="tel" id="wsp" placeholder="Ej. 11 2233 4455" autocomplete="tel" inputmode="tel"><div class="msg">Ingresá un número válido.</div></div>
      <div class="field" id="f-email"><label>Email <span style="opacity:.6">(opcional)</span></label><input type="email" id="email" placeholder="tucorreo@email.com" autocomplete="email"><div class="msg">Revisá el formato del email.</div></div>
      <button class="wa-btn" id="send">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.2-1.7-.8-2-.9-.3-.1-.5-.2-.6.2-.2.3-.7.9-.8 1-.2.2-.3.2-.6.1-1.6-.8-2.6-1.4-3.7-3.2-.3-.5.3-.5.8-1.5.1-.2 0-.4 0-.5 0-.2-.6-1.5-.9-2-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.3.3-1 .9-1 2.3s1 2.7 1.2 2.9c.1.2 2 3.1 5 4.3.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.5-.1 1.7-.7 1.9-1.4.2-.6.2-1.2.2-1.3-.1-.1-.3-.2-.6-.3zM12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2z"/></svg>
        Enviar mi consulta por WhatsApp
      </button>
      <div class="nav" style="margin-top:8px">
        <button class="btn btn-ghost" id="back-result">&larr; Volver y editar</button>
        <button class="btn btn-ghost" id="restart">&#8634; Empezar de nuevo</button>
      </div>
    </div>
  </div>`;
  document.getElementById('restart').onclick = ()=>{ Object.assign(state,{ancho:null,material:null,equiposDj:{mixer:null,tipo:null,cantidad:null},batea:{incluye:null},montaje:null,extras:{},step:0}); renderStep(); };
  document.getElementById('back-result').onclick = ()=>{ state.step = activeSteps().length - 1; renderStep(); };
  document.getElementById('send').onclick = enviarWhatsApp;
}

function enviarWhatsApp(){
  const nombre = document.getElementById('nombre').value.trim();
  const wsp = document.getElementById('wsp').value.trim();
  const email = document.getElementById('email').value.trim();
  let ok = true;
  const setErr = (id,bad)=>{ document.getElementById(id).classList.toggle('err',bad); if(bad) ok=false; };
  setErr('f-nombre', nombre.length < 2);
  setErr('f-wsp', wsp.replace(/\D/g,'').length < 6);
  setErr('f-email', email !== "" && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email));
  if(!ok) return;
  const r = calc();
  const bateaTxt = r.cubos>0 ? `\n- Batea de vinilos: sí (${r.cubos} espacios para discos, estimados por el ancho)` : '';
  const extrasTxt = r.ext>0 ? `\n- Extras: ${extrasResumen()}` : '';
  const msg =
`Hola! Quiero cotizar una cabina a medida

- Nombre: ${nombre}
- WhatsApp: ${wsp}${email?`\n- Email: ${email}`:''}

Configuracion elegida:
- Ancho: ${state.ancho} cm
- Material: ${CONFIG.material[state.material].label}
- Mixer: ${CONFIG.equiposDj.mixer.opts[state.equiposDj.mixer].label}
- Equipos: ${CONFIG.equiposDj.tipo.opts[state.equiposDj.tipo].label} (${CONFIG.equiposDj.cantidad.opts[state.equiposDj.cantidad].label} equipos)${bateaTxt}
- Montaje: ${CONFIG.montaje[state.montaje].label}${extrasTxt}

Estimado online: ${money(r.min)} - ${money(r.max)}`;
  window.open(`https://wa.me/${CONFIG.whatsappDestino}?text=${encodeURIComponent(msg)}`,'_blank');
  renderDone(nombre);
}

function renderDone(nombre){
  screen.innerHTML = `<div class="card done fade">
    <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
    <h2>¡Listo${nombre?`, ${nombre.split(' ')[0]}`:''}!</h2>
    <p>Se abrió WhatsApp con tu consulta. Si no se abrió, revisá que tengas la app y volvé a tocar el botón.</p>
    <button class="btn btn-ghost" style="margin-top:20px" onclick="location.reload()">&#8634; Hacer otro presupuesto</button>
  </div>`;
}

renderStep();
